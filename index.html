<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PWA Landscape Test</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#e94560" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
</head>
<body style="font-family:sans-serif;background:#1a1a2e;color:#eee;padding:30px;text-align:center">

  <h2 style="color:#e94560">PWA Landscape Test</h2>
  <p>Manifest: <code>"orientation": "landscape"</code></p>
  <p>Sin <code>screen.orientation.lock()</code></p>

  <hr style="margin:20px 0;border-color:#333"/>

  <p>Orientación detectada: <strong id="ori">—</strong></p>
  <p>Display mode: <strong id="mode">—</strong></p>
  <p>Pantalla: <strong id="size">—</strong></p>

  <script>
    document.getElementById('ori').textContent = screen.orientation?.type ?? 'no soportado';
    document.getElementById('size').textContent = screen.width + ' × ' + screen.height;

    screen.orientation?.addEventListener('change', () => {
      document.getElementById('ori').textContent = screen.orientation.type;
      document.getElementById('size').textContent = screen.width + ' × ' + screen.height;
    });

    const modes = ['standalone', 'fullscreen', 'minimal-ui', 'browser'];
    document.getElementById('mode').textContent =
      modes.find(m => matchMedia('(display-mode:' + m + ')').matches) ?? 'browser';

    navigator.serviceWorker?.register('sw.js');
  </script>
</body>
</html>
